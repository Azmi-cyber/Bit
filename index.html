<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Shortener | .lnk Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
        }
        .glass {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 255, 204, 0.2);
        }
        .glow {
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.5);
        }
        input:focus {
            border-color: #00ffcc;
            box-shadow: 0 0 0 3px rgba(0, 255, 204, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-gray-200">
    <div class="glass rounded-2xl p-8 w-full max-w-md border border-gray-800">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold glow">⚡ FROST SHORTENER</h1>
            <p class="text-gray-400 text-sm mt-2">Generate .lnk short links instantly</p>
        </div>

        <form id="shortenForm" class="space-y-4">
            <input type="url" id="originalUrl" placeholder="https://example.com/your-long-url" required class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-3 focus:border-[#00ffcc] transition">
            <button type="submit" class="w-full bg-[#00ffcc] text-black font-bold py-3 rounded-lg hover:bg-[#00ddbb] transition duration-200">GENERATE .LNK</button>
        </form>

        <div id="result" class="mt-6 hidden">
            <div class="bg-black/50 rounded-lg p-4 border border-[#00ffcc]/30">
                <p class="text-xs text-gray-400 mb-1">Your short link:</p>
                <div class="flex items-center gap-2">
                    <input type="text" id="shortLink" readonly class="flex-1 bg-transparent text-[#00ffcc] text-sm font-mono border-none focus:outline-none">
                    <button onclick="copyLink()" class="bg-[#00ffcc]/20 hover:bg-[#00ffcc]/40 px-3 py-1 rounded text-xs transition">Copy</button>
                </div>
            </div>
        </div>

        <p class="text-xs text-center text-gray-500 mt-6">🔗 Format: domain.vercel.app/link[random]</p>
    </div>

    <script>
        const API_URL = '/api/shorten';

        document.getElementById('shortenForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const originalUrl = document.getElementById('originalUrl').value;
            const submitBtn = e.target.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.textContent = 'GENERATING...';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: originalUrl })
                });
                const data = await res.json();
                
                if (data.code) {
                    const shortUrl = `${window.location.origin}/link${data.code}`;
                    document.getElementById('shortLink').value = shortUrl;
                    document.getElementById('result').classList.remove('hidden');
                } else {
                    alert('Gagal generate link: ' + (data.error || 'Unknown error'));
                }
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'GENERATE .LNK';
            }
        });

        function copyLink() {
            const input = document.getElementById('shortLink');
            input.select();
            document.execCommand('copy');
            alert('✅ Link copied!');
        }
    </script>
</body>
  </html>
